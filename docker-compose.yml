version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: ecommerce_postgres
    environment:
      POSTGRES_USER: dbt_user
      POSTGRES_PASSWORD: dbt_password
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data:/data

  metabase:
    image: metabase/metabase:latest
    container_name: ecommerce_metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ecommerce
      MB_DB_PORT: 5432
      MB_DB_USER: dbt_user
      MB_DB_PASS: dbt_password
      MB_DB_HOST: postgres
    depends_on:
      - postgres

volumes:
  postgres_data:
