version: 2

sources:
  - name: ecommerce
    description: "Raw E-commerce transaction data"
    schema: raw
    tables:
      - name: e_commerce_data
        description: "Original sales records from the e-commerce store"
        columns:
          - name: InvoiceNo
            description: "Invoice number"
            tests:
              - not_null
          - name: CustomerID
            description: "Unique customer ID"
